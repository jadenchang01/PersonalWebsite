<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#1a2332"/>
  <!-- Phone frame -->
  <rect x="140" y="20" width="120" height="260" rx="16" fill="#2a3544" stroke="#374151" stroke-width="2"/>
  <!-- Screen -->
  <rect x="148" y="40" width="104" height="220" rx="4" fill="#0f1419"/>
  <!-- Status bar -->
  <rect x="158" y="48" width="30" height="6" rx="2" fill="#4b5563"/>
  <rect x="212" y="48" width="30" height="6" rx="2" fill="#4b5563"/>
  <!-- App header -->
  <rect x="158" y="66" width="84" height="12" rx="2" fill="#e5e7eb"/>
  <!-- Task cards -->
  <rect x="158" y="90" width="84" height="36" rx="4" fill="#22c55e" opacity="0.2"/>
  <rect x="166" y="98" width="50" height="6" rx="1" fill="#22c55e"/>
  <rect x="166" y="112" width="68" height="4" rx="1" fill="#4b5563"/>
  <rect x="158" y="134" width="84" height="36" rx="4" fill="#3b82f6" opacity="0.2"/>
  <rect x="166" y="142" width="60" height="6" rx="1" fill="#3b82f6"/>
  <rect x="166" y="156" width="68" height="4" rx="1" fill="#4b5563"/>
  <rect x="158" y="178" width="84" height="36" rx="4" fill="#eab308" opacity="0.2"/>
  <rect x="166" y="186" width="45" height="6" rx="1" fill="#eab308"/>
  <rect x="166" y="200" width="68" height="4" rx="1" fill="#4b5563"/>
  <!-- Bottom nav -->
  <rect x="158" y="230" width="84" height="24" rx="4" fill="#2a3544"/>
  <circle cx="178" cy="242" r="6" fill="#3b82f6"/>
  <circle cx="200" cy="242" r="6" fill="#4b5563"/>
  <circle cx="222" cy="242" r="6" fill="#4b5563"/>
  <!-- Notch -->
  <rect x="180" y="24" width="40" height="8" rx="4" fill="#0f1419"/>
</svg>
